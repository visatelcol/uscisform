<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USCIS Evidence Organizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; color: #1a1a1a; min-height: 100vh; }

  .app { max-width: 620px; margin: 0 auto; padding: 20px 16px 60px; }

  /* Header */
  .hdr { text-align: center; padding: 24px 0 20px; }
  .hdr small { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #2563eb; text-transform: uppercase; }
  .hdr h1 { font-size: 22px; font-weight: 700; margin: 2px 0 4px; }
  .hdr p  { font-size: 13px; color: #6b7280; }

  /* Card */
  .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .card h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }

  /* Form */
  label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 4px; }
  input[type="text"], input[type="date"], textarea {
    width: 100%; padding: 9px 10px; border: 1px solid #d1d5db; border-radius: 6px;
    font-size: 14px; font-family: inherit; margin-bottom: 12px; background: #fff;
  }
  textarea { resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; padding: 10px 20px; transition: opacity .15s; }
  .btn:hover { opacity: .88; }
  .btn:disabled { opacity: .4; cursor: default; }
  .btn-green  { background: #16a34a; color: #fff; width: 100%; }
  .btn-blue   { background: #1d4ed8; color: #fff; width: 100%; }
  .btn-ghost  { background: #f3f4f6; color: #374151; border: 1px dashed #9ca3af; }
  .btn-sm     { font-size: 12px; padding: 5px 12px; }
  .btn-danger { background: none; border: none; color: #ef4444; font-size: 12px; font-weight: 600; cursor: pointer; }

  /* Thumbnails */
  .thumbs { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
  .thumb-wrap { position: relative; display: inline-block; }
  .thumb-wrap img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 1px solid #d1d5db; }
  .thumb-x { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; background: #ef4444; color: #fff; border: none; font-size: 13px; line-height: 18px; cursor: pointer; font-weight: 700; }

  /* Entry cards */
  .entry { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 14px; margin-bottom: 10px; }
  .entry-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .entry-num  { font-size: 12px; color: #6b7280; font-weight: 600; }
  .entry-meta { font-size: 13px; line-height: 1.7; }
  .entry-meta strong { color: #374151; }
  .entry-photos { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .entry-photos img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; border: 1px solid #d1d5db; }

  .empty { text-align: center; color: #9ca3af; font-size: 13px; padding: 20px 0; }

  /* Generating overlay */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .overlay-box { background: #fff; border-radius: 14px; padding: 32px 40px; text-align: center; }
  .spinner { width: 36px; height: 36px; border: 3px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .app { padding: 12px 10px 40px; }
    .card { padding: 14px; }
  }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="hdr">
    <small>USCIS</small>
    <h1>Evidence Photo Organizer</h1>
    <p>Upload photos with details, then download a PDF evidence package.</p>
  </div>

  <!-- FORM -->
  <div class="card">
    <h2>Add New Evidence</h2>

    <label for="f-date">When — Date of Event *</label>
    <input type="date" id="f-date">

    <label for="f-loc">Where — Location *</label>
    <input type="text" id="f-loc" placeholder="e.g. Central Park, New York, NY">

    <label for="f-who">Who — People Present *</label>
    <input type="text" id="f-who" placeholder="e.g. John Doe (petitioner), Jane Doe (beneficiary)">

    <label for="f-desc">Description (optional)</label>
    <textarea id="f-desc" rows="2" placeholder="Brief description of the event..."></textarea>

    <label>Photos *</label>
    <input type="file" id="f-files" accept="image/*" multiple style="display:none">
    <button class="btn btn-ghost" onclick="document.getElementById('f-files').click()">📷 Choose Photos</button>
    <div class="thumbs" id="thumbs"></div>

    <button class="btn btn-green" id="btn-add" disabled onclick="addEntry()">+ Add Evidence</button>
  </div>

  <!-- ENTRIES -->
  <div id="entries-section" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <h2 style="font-size:15px;font-weight:600;">Evidence Items (<span id="count">0</span>)</h2>
    </div>
    <div id="entries-list"></div>
    <button class="btn btn-blue" onclick="generatePDF()">📄 Download PDF</button>
  </div>

  <p class="empty" id="empty-msg">No evidence items added yet. Fill in the form above to get started.</p>
</div>

<!-- Generating overlay -->
<div class="overlay" id="overlay" style="display:none">
  <div class="overlay-box">
    <div class="spinner"></div>
    <div style="font-size:15px;font-weight:600;">Generating PDF…</div>
    <div style="font-size:13px;color:#6b7280;margin-top:4px;">This may take a moment.</div>
  </div>
</div>

<script>
const { jsPDF } = window.jspdf;

let entries = [];
let currentImages = []; // array of { dataUrl, file }

// ---- Form logic ----
const fDate = document.getElementById("f-date");
const fLoc  = document.getElementById("f-loc");
const fWho  = document.getElementById("f-who");
const fDesc = document.getElementById("f-desc");
const fFiles = document.getElementById("f-files");
const btnAdd = document.getElementById("btn-add");
const thumbsDiv = document.getElementById("thumbs");

function checkForm() {
  btnAdd.disabled = !(fDate.value && fLoc.value.trim() && fWho.value.trim() && currentImages.length > 0);
}
[fDate, fLoc, fWho].forEach(el => el.addEventListener("input", checkForm));

fFiles.addEventListener("change", function() {
  Array.from(this.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      currentImages.push(e.target.result);
      renderThumbs();
      checkForm();
    };
    reader.readAsDataURL(file);
  });
  this.value = "";
});

function renderThumbs() {
  thumbsDiv.innerHTML = currentImages.map((src, i) =>
    `<div class="thumb-wrap">
      <img src="${src}">
      <button class="thumb-x" onclick="removeImg(${i})">×</button>
    </div>`
  ).join("");
}

function removeImg(i) {
  currentImages.splice(i, 1);
  renderThumbs();
  checkForm();
}

function addEntry() {
  entries.push({
    date: fDate.value,
    location: fLoc.value.trim(),
    people: fWho.value.trim(),
    description: fDesc.value.trim(),
    images: [...currentImages]
  });
  fDate.value = ""; fLoc.value = ""; fWho.value = ""; fDesc.value = "";
  currentImages = [];
  renderThumbs();
  checkForm();
  renderEntries();
}

function removeEntry(i) {
  entries.splice(i, 1);
  renderEntries();
}

function renderEntries() {
  const section = document.getElementById("entries-section");
  const list = document.getElementById("entries-list");
  const empty = document.getElementById("empty-msg");
  document.getElementById("count").textContent = entries.length;

  if (entries.length === 0) {
    section.style.display = "none";
    empty.style.display = "block";
    return;
  }
  section.style.display = "block";
  empty.style.display = "none";

  list.innerHTML = entries.map((e, i) => `
    <div class="entry">
      <div class="entry-head">
        <span class="entry-num">Evidence #${i + 1}</span>
        <button class="btn-danger" onclick="removeEntry(${i})">Remove</button>
      </div>
      <div class="entry-meta">
        <div><strong>Date:</strong> ${formatDate(e.date)}</div>
        <div><strong>Location:</strong> ${e.location}</div>
        <div><strong>People:</strong> ${e.people}</div>
        ${e.description ? `<div><strong>Description:</strong> ${e.description}</div>` : ""}
      </div>
      <div class="entry-photos">
        ${e.images.map(img => `<img src="${img}">`).join("")}
      </div>
    </div>
  `).join("");
}

function formatDate(d) {
  if (!d) return "";
  const [y, m, day] = d.split("-");
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${months[parseInt(m)-1]} ${parseInt(day)}, ${y}`;
}

// ---- PDF Generation ----
function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

async function generatePDF() {
  document.getElementById("overlay").style.display = "flex";

  try {
    const doc = new jsPDF({ unit: "mm", format: "letter" });
    const W = doc.internal.pageSize.getWidth();
    const H = doc.internal.pageSize.getHeight();
    const marginL = 20, marginR = 20, marginT = 20;
    const usable = W - marginL - marginR;
    let y = marginT;

    function checkPage(need) {
      if (y + need > H - 20) { doc.addPage(); y = marginT; }
    }

    // Title page
    y = 60;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(22);
    doc.text("EVIDENCE PACKAGE", W / 2, y, { align: "center" });
    y += 10;
    doc.setFont("helvetica", "normal");
    doc.setFontSize(11);
    doc.text("Prepared for U.S. Citizenship and Immigration Services (USCIS)", W / 2, y, { align: "center" });
    y += 7;
    doc.setFontSize(10);
    doc.setTextColor(100);
    const today = new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
    doc.text("Generated on " + today, W / 2, y, { align: "center" });
    y += 5;
    doc.setDrawColor(30);
    doc.setLineWidth(0.5);
    doc.line(marginL, y, W - marginR, y);
    y += 6;
    doc.setFontSize(10);
    doc.text("Total evidence items: " + entries.length, W / 2, y, { align: "center" });
    doc.setTextColor(0);

    // Each entry
    for (let i = 0; i < entries.length; i++) {
      const e = entries[i];
      doc.addPage();
      y = marginT;

      // Entry header
      doc.setFont("helvetica", "bold");
      doc.setFontSize(14);
      doc.text("Evidence #" + (i + 1), marginL, y);
      y += 2;
      doc.setDrawColor(200);
      doc.setLineWidth(0.3);
      doc.line(marginL, y, W - marginR, y);
      y += 8;

      // Metadata
      doc.setFontSize(10);
      const meta = [
        ["Date of Event:", formatDate(e.date)],
        ["Location:", e.location],
        ["People Present:", e.people],
      ];
      if (e.description) meta.push(["Description:", e.description]);

      for (const [label, val] of meta) {
        doc.setFont("helvetica", "bold");
        doc.text(label, marginL, y);
        doc.setFont("helvetica", "normal");
        const labelW = doc.getTextWidth(label) + 2;
        const lines = doc.splitTextToSize(val, usable - labelW);
        doc.text(lines, marginL + labelW, y);
        y += lines.length * 5 + 3;
      }

      y += 4;

      // Photos — preserve aspect ratio, 2-column grid
      const maxThumbW = (usable - 6) / 2;  // 2 columns with 6mm gap
      const gap = 6;

      // Process images in pairs for 2-column layout
      let j = 0;
      while (j < e.images.length) {
        const rowImgs = [];

        // Load up to 2 images for this row
        for (let c = 0; c < 2 && j + c < e.images.length; c++) {
          try {
            const img = await loadImage(e.images[j + c]);
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0);
            const jpeg = canvas.toDataURL("image/jpeg", 0.75);
            const ratio = img.naturalHeight / img.naturalWidth;
            let drawW = maxThumbW;
            let drawH = drawW * ratio;
            const maxH = 100; // cap height at 100mm
            if (drawH > maxH) { drawH = maxH; drawW = drawH / ratio; }
            rowImgs.push({ jpeg, drawW, drawH });
          } catch(err) {
            rowImgs.push({ error: true, drawW: maxThumbW, drawH: 40 });
          }
        }

        const rowH = Math.max(...rowImgs.map(r => r.drawH));
        checkPage(rowH + 8);

        for (let c = 0; c < rowImgs.length; c++) {
          const x = marginL + c * (maxThumbW + gap);
          const ri = rowImgs[c];
          if (ri.error) {
            doc.setFontSize(8);
            doc.text("[Image could not be loaded]", x, y + 20);
          } else {
            doc.addImage(ri.jpeg, "JPEG", x, y, ri.drawW, ri.drawH);
          }
        }

        y += rowH + gap;
        j += rowImgs.length;
      }
      y += 4;
    }

    // Footer on last page
    doc.setFontSize(8);
    doc.setTextColor(150);
    doc.text("This document was compiled as supporting evidence for a USCIS application.", W / 2, H - 12, { align: "center" });

    doc.save("USCIS_Evidence_Package.pdf");
  } catch (err) {
    alert("Error generating PDF: " + err.message);
    console.error(err);
  } finally {
    document.getElementById("overlay").style.display = "none";
  }
}
</script>
</body>
</html>
